<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- ✅ FIXED VIEWPORT + IOS SAFE AREA -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0c0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>CLEARSHOT RAW</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0b0c0b;
      --bg-2: #121412;
      --bg-3: #181b19;
      --bg-4: #202521;

      --cream: #f4efe6;
      --soft-cream: rgba(244, 239, 230, 0.82);
      --muted-cream: rgba(244, 239, 230, 0.56);

      --sage: #a8b4a3;
      --sage-soft: rgba(168, 180, 163, 0.12);

      --glass: rgba(255, 255, 255, 0.08);
      --glass-strong: rgba(255, 255, 255, 0.11);
      --glass-line: rgba(255, 255, 255, 0.18);
      --shadow: rgba(0, 0, 0, 0.28);

      --mx: 50%;
      --my: 50%;
    }

    /* ✅ FIXED BACKGROUND TO FILL ENTIRE SCREEN */
    html {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 16% 22%, rgba(244, 239, 230, 0.09), transparent 22%),
        radial-gradient(circle at 30% 70%, rgba(244, 239, 230, 0.05), transparent 20%),
        radial-gradient(circle at 82% 78%, rgba(168, 180, 163, 0.10), transparent 22%),
        radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.06), transparent 16%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 28%, var(--bg-3) 68%, var(--bg-4) 100%);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }

    body {
      width: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      font-family: "Inter", sans-serif;
      color: var(--cream);

      /* SAME BACKGROUND (prevents cutoff) */
      background:
        radial-gradient(circle at 16% 22%, rgba(244, 239, 230, 0.09), transparent 22%),
        radial-gradient(circle at 30% 70%, rgba(244, 239, 230, 0.05), transparent 20%),
        radial-gradient(circle at 82% 78%, rgba(168, 180, 163, 0.10), transparent 22%),
        radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.06), transparent 16%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 28%, var(--bg-3) 68%, var(--bg-4) 100%);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      position: relative;
      z-index: 1;
      width: min(100%, 72rem);
      padding: 2rem;
      padding-bottom: calc(2rem + env(safe-area-inset-bottom)); /* ✅ FIX */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-inner {
      width: 100%;
      max-width: 62rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted-cream);
      margin-bottom: 1.25rem;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.15rem;
    }

    .brand-main {
      font-size: clamp(3.2rem, 8vw, 6.4rem);
      font-weight: 700;
    }

    .raw-glass {
      padding: 0.12em 0.36em;
      border-radius: 0.34em;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .tagline {
      margin-bottom: 2rem;
      color: var(--soft-cream);
    }

    .button-row {
      display: flex;
      gap: 1rem;
    }

    .glass-btn,
    .solid-btn {
      padding: 1rem 1.4rem;
      border-radius: 999px;
      cursor: pointer;
      border: none;
    }

    .glass-btn {
      background: rgba(255,255,255,0.06);
      color: white;
    }

    .solid-btn {
      background: #f4efe6;
      color: black;
    }

    .bottom-mark {
      position: absolute;
      bottom: calc(1rem + env(safe-area-inset-bottom)); /* ✅ FIX */
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: rgba(244,239,230,0.4);
    }
  </style>
</head>

<body>
  <main class="hero">
    <div class="hero-inner">
      <div class="eyebrow">Photography Portfolio</div>

      <div class="brand-row">
        <div class="brand-main">CLEARSHOT</div>
        <div class="raw-glass">RAW</div>
      </div>

      <p class="tagline">Your vision, but better.</p>

      <div class="button-row">
        <a href="pictures.html"><button class="glass-btn">Pictures</button></a>
        <a href="booking.html"><button class="solid-btn">Booking</button></a>
      </div>
    </div>
  </main>

  <div class="bottom-mark">© 2026 CLEARSHOT RAW</div>
</body>
</html>
