<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLEARSHOT RAW</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0a0a0d;
      --bg-2: #141416;
      --bg-3: #20262b;
      --gold: rgba(195, 168, 108, 0.22);
      --fog: rgba(255, 255, 255, 0.08);
      --fog-2: rgba(255, 255, 255, 0.04);
      --text: rgba(255, 255, 255, 0.96);
      --muted: rgba(255, 255, 255, 0.72);
      --line: rgba(255, 255, 255, 0.16);
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 24%, rgba(188, 155, 83, 0.34), transparent 24%),
        radial-gradient(circle at 30% 72%, rgba(135, 109, 60, 0.20), transparent 20%),
        radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.06), transparent 18%),
        radial-gradient(circle at 84% 78%, rgba(124, 140, 142, 0.14), transparent 24%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 35%, var(--bg-3) 100%);
      position: relative;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 22%),
        radial-gradient(circle at 75% 75%, rgba(255,255,255,0.04), transparent 24%);
      filter: blur(40px);
      z-index: -2;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 18%),
        linear-gradient(to top, rgba(0,0,0,0.22), transparent 24%);
      z-index: -1;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.55;
      pointer-events: none;
    }

    .orb-1 {
      width: 28rem;
      height: 28rem;
      top: -10rem;
      left: -8rem;
      background: rgba(191, 157, 89, 0.15);
    }

    .orb-2 {
      width: 24rem;
      height: 24rem;
      right: -7rem;
      bottom: -8rem;
      background: rgba(153, 166, 170, 0.10);
    }

    .shape {
      position: absolute;
      border-radius: 44% 56% 58% 42% / 41% 39% 61% 59%;
      background: var(--fog-2);
      pointer-events: none;
    }

    .shape-1 {
      width: 15rem;
      height: 15rem;
      top: -2rem;
      right: 8rem;
    }

    .shape-2 {
      width: 11rem;
      height: 11rem;
      bottom: 2.5rem;
      right: 11rem;
    }

    .shape-3 {
      width: 10rem;
      height: 10rem;
      left: -2rem;
      bottom: 4rem;
      background: rgba(188, 155, 83, 0.09);
    }

    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }

    .hero-inner {
      max-width: 60rem;
      width: 100%;
    }

    .eyebrow {
      display: inline-block;
      letter-spacing: 0.22em;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.58);
      margin-bottom: 1.4rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.9rem, 8vw, 6rem);
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
      text-wrap: balance;
    }

    .clearshot {
      color: rgba(255,255,255,0.98);
      font-weight: 650;
    }

    .raw-wrap {
      display: inline-flex;
      align-items: center;
      margin-left: 0.18em;
      vertical-align: middle;
    }

    .raw {
      display: inline-block;
      padding: 0.06em 0.34em 0.1em;
      border-radius: 0.22em;
      color: rgba(255,255,255,0.92);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 10px 30px rgba(0,0,0,0.18);
    }

    .tagline {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 2rem;
      letter-spacing: 0.01em;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 0.85rem;
      flex-wrap: wrap;
      margin-bottom: 1.6rem;
    }

    .ghost-btn,
    .solid-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 8rem;
      padding: 0.88rem 1.15rem;
      border-radius: 999px;
      font-size: 0.96rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .ghost-btn {
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .solid-btn {
      color: #151515;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .ghost-btn:hover,
    .solid-btn:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }

    .bottom-mark {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 1.5rem;
      }

      h1 {
        line-height: 1;
      }

      .raw-wrap {
        margin-left: 0.1em;
      }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <main class="hero">
    <div class="hero-inner">
      <div class="eyebrow">Photography Portfolio</div>

      <h1>
        <span class="clearshot">CLEARSHOT</span>
        <span class="raw-wrap"><span class="raw">RAW</span></span>
      </h1>

      <p class="tagline">Your vision, but better.</p>

      <div class="button-row">
        <div class="ghost-btn">Pictures</div>
        <div class="solid-btn">Booking</div>
      </div>
    </div>
  </main>

  <div class="bottom-mark">© 2026 CLEARSHOT RAW</div>
</body>
</html>
