<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- 🔥 THIS LINE FIXES iPhone SAFE AREA -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>CLEARSHOT RAW</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0b0c0b;
      --bg-2: #121412;
      --bg-3: #181b19;
      --bg-4: #202521;

      --cream: #f4efe6;
      --soft-cream: rgba(244, 239, 230, 0.82);
      --muted-cream: rgba(244, 239, 230, 0.56);

      --sage: #a8b4a3;
      --sage-soft: rgba(168, 180, 163, 0.12);

      --mx: 50%;
      --my: 50%;
    }

    /* 🔥 FORCE BACKGROUND EVERYWHERE */
    html {
      height: 100%;
      background:
        radial-gradient(circle at 16% 22%, rgba(244, 239, 230, 0.09), transparent 22%),
        radial-gradient(circle at 30% 70%, rgba(244, 239, 230, 0.05), transparent 20%),
        radial-gradient(circle at 82% 78%, rgba(168, 180, 163, 0.10), transparent 22%),
        radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.06), transparent 16%),
        linear-gradient(135deg, var(--bg-1), var(--bg-4));
    }

    body {
      min-height: 100vh;
      min-height: 100dvh; /* 🔥 modern fix */
      font-family: "Inter", sans-serif;
      color: var(--cream);

      /* SAME BACKGROUND */
      background: inherit;

      display: flex;
      align-items: center;
      justify-content: center;

      /* 🔥 FIX SAFE AREAS (top/bottom bars) */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);

      overflow: hidden;
      position: relative;
    }

    .hero {
      text-align: center;
    }

    .brand-main {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
    }

    .raw-glass {
      display: inline-block;
      padding: 0.2em 0.5em;
      border-radius: 12px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .tagline {
      margin-top: 1rem;
      font-size: 1.2rem;
      color: var(--soft-cream);
    }

    .button-row {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .glass-btn, .solid-btn {
      padding: 1rem 1.5rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }

    .glass-btn {
      background: rgba(255,255,255,0.08);
      color: var(--cream);
    }

    .solid-btn {
      background: var(--cream);
      color: black;
    }

  </style>
</head>

<body>

  <main class="hero">
    <div class="brand-main">
      CLEARSHOT <span class="raw-glass">RAW</span>
    </div>

    <p class="tagline">Your vision, but better.</p>

    <div class="button-row">
      <a href="pictures.html" class="glass-btn">Pictures</a>
      <a href="booking.html" class="solid-btn">Booking</a>
    </div>
  </main>

</body>
</html>
