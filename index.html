<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLEARSHOT RAW</title>

  <!-- Elegant font for tagline -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0a0b0a;
      --bg-2: #111311;
      --bg-3: #171a18;
      --bg-4: #1c211e;

      --cream: #f4efe6;
      --soft-cream: rgba(244, 239, 230, 0.82);
      --muted-cream: rgba(244, 239, 230, 0.60);

      --sage: #a8b4a3;
      --sage-soft: rgba(168, 180, 163, 0.16);

      --glass: rgba(255, 255, 255, 0.07);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--cream);

      /* UPDATED BACKGROUND (more cream, still dark) */
      background:
        radial-gradient(circle at 16% 22%, rgba(244, 239, 230, 0.09), transparent 22%),
        radial-gradient(circle at 30% 70%, rgba(244, 239, 230, 0.05), transparent 20%),
        radial-gradient(circle at 82% 78%, rgba(168, 180, 163, 0.10), transparent 22%),
        radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.06), transparent 16%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 28%, var(--bg-3) 68%, var(--bg-4) 100%);
      
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted-cream);
      margin-bottom: 1.2rem;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }

    .brand-main {
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 600;
      letter-spacing: -0.05em;
    }

    .raw-glass {
      padding: 0.1em 0.35em;
      border-radius: 0.3em;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15),
                  0 10px 30px rgba(0,0,0,0.25);
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 600;
    }

    /* UPDATED TAGLINE */
    .tagline {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      color: var(--soft-cream);
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }

    .btn {
      padding: 0.8rem 1.3rem;
      border-radius: 999px;
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .btn-light {
      background: rgba(255,255,255,0.9);
      color: black;
    }

    .btn-dark {
      background: rgba(255,255,255,0.06);
      color: white;
    }

    .footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.7rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="hero">
    <div class="eyebrow">Photography Portfolio</div>

    <div class="brand-row">
      <div class="brand-main">CLEARSHOT</div>
      <div class="raw-glass">RAW</div>
    </div>

    <div class="tagline">Your vision, but better.</div>

    <div class="buttons">
      <div class="btn btn-dark">Pictures</div>
      <div class="btn btn-light">Booking</div>
    </div>
  </div>

  <div class="footer">© 2026 CLEARSHOT RAW</div>
</body>
</html>
